<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Favicon -->
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />

    <!-- iOS Home Screen -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GRAVITACIO" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300..800&family=Manrope:wght@300..800&display=swap"
      rel="stylesheet"
    />

    <title>GRAVITACIO — Climbing Session Generator</title>
    <meta
      name="description"
      content="Generate personalized climbing sessions based on your level, goals, and energy."
    />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t === "dark") {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom)
          env(safe-area-inset-left);
        transition: opacity 0.3s ease-out;
      }
      #splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash-logo {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      #splash-text {
        font-family: "Sora", sans-serif;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: #fff;
        margin-bottom: 32px;
      }
      #splash-loader {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(147, 51, 234, 0.2);
        border-top-color: #9333ea;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.8;
        }
      }
    </style>
  </head>
  <body>
    <!-- PWA Splash Screen -->
    <div id="splash-screen">
      <svg id="splash-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" stroke="#9333ea" stroke-width="3" fill="none" />
        <circle
          cx="50"
          cy="50"
          r="30"
          stroke="#9333ea"
          stroke-width="2"
          fill="none"
          opacity="0.6"
        />
        <circle cx="50" cy="50" r="15" fill="#9333ea" />
      </svg>
      <div id="splash-text">GRAVITACIO</div>
      <div id="splash-loader"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
